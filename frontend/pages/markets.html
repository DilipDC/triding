<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050814">
  <title>Ultra Trading – Markets</title>
  <link rel="stylesheet" href="../assets/css/shared.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; animation: pageEnter 0.4s ease; }
    .page-header { background: var(--bg-surface); padding: 14px 16px 0; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
    .page-title { font-size: 22px; font-weight: 900; margin-bottom: 14px; }
    .search-bar { display: flex; align-items: center; background: var(--bg-elevated); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 10px 14px; gap: 10px; margin-bottom: 12px; }
    .search-bar input { flex: 1; background: transparent; color: var(--text-primary); font-size: 15px; }
    .cat-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; scrollbar-width: none; }
    .cat-pill { padding: 7px 16px; border-radius: 20px; font-size: 13px; font-weight: 700; background: var(--bg-elevated); border: 1px solid var(--border-color); color: var(--text-secondary); white-space: nowrap; cursor: pointer; transition: var(--transition); flex-shrink: 0; }
    .cat-pill.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; box-shadow: 0 4px 14px var(--accent-blue-glow); }

    .markets-list { flex: 1; overflow-y: auto; padding: 8px 0; }

    /* Market item card */
    .market-item {
      display: flex; align-items: center; gap: 14px; padding: 14px 16px;
      border-bottom: 1px solid var(--border-light); cursor: pointer;
      transition: var(--transition); position: relative;
    }
    .market-item:active { background: var(--bg-elevated); transform: scale(0.99); }
    .m-icon { font-size: 28px; width: 48px; height: 48px; background: var(--bg-elevated); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 1px solid var(--border-color); }
    .m-info { flex: 1; min-width: 0; }
    .m-symbol { font-size: 15px; font-weight: 800; }
    .m-name { font-size: 12px; color: var(--text-secondary); }
    .m-center { display: flex; flex-direction: column; align-items: center; }
    .m-mini-chart { height: 32px; width: 70px; }
    .m-right { text-align: right; }
    .m-price { font-size: 15px; font-weight: 800; }
    .m-change { font-size: 12px; font-weight: 700; padding: 3px 7px; border-radius: 12px; margin-top: 3px; display: inline-block; }
    .m-change.up { background: rgba(0,217,100,0.15); color: var(--neon-green); }
    .m-change.dn { background: rgba(255,59,48,0.15); color: var(--neon-red); }
    .m-profit { font-size: 11px; color: var(--neon-green); font-weight: 700; margin-top: 2px; }

    /* Section headers */
    .section-header { padding: 14px 16px 6px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); display: flex; justify-content: space-between; background: var(--bg-deep); }

    /* Trending strip */
    .trending-strip { display: flex; gap: 10px; overflow-x: auto; padding: 12px 16px; scrollbar-width: none; flex-shrink: 0; background: var(--bg-surface); border-bottom: 1px solid var(--border-color); }
    .trending-chip { flex-shrink: 0; background: var(--bg-elevated); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 8px 12px; cursor: pointer; transition: var(--transition); }
    .trending-chip:active { transform: scale(0.95); }
    .tc-symbol { font-size: 12px; font-weight: 800; }
    .tc-price { font-size: 13px; font-weight: 700; margin-top: 2px; }
    .tc-change { font-size: 11px; font-weight: 700; }

    .loading-row { padding: 20px; text-align: center; color: var(--text-muted); }
    .empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
    .empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="page-header">
  <div class="page-title">📈 Markets</div>
  <div class="search-bar">
    <span style="font-size:18px">🔍</span>
    <input type="text" id="searchInput" placeholder="Search BTC, ETH, Gold..." oninput="onSearch()">
    <span id="clearSearch" style="cursor:pointer;color:var(--text-muted);display:none;" onclick="clearSearch()">✕</span>
  </div>
  <div class="cat-scroll">
    <div class="cat-pill active" onclick="selectCat('all',this)">🌐 All</div>
    <div class="cat-pill" onclick="selectCat('crypto',this)">🪙 Crypto</div>
    <div class="cat-pill" onclick="selectCat('forex',this)">💱 Forex</div>
    <div class="cat-pill" onclick="selectCat('commodity',this)">🥇 Commodities</div>
    <div class="cat-pill" onclick="selectCat('stock',this)">📊 Stocks</div>
  </div>
</div>

<!-- Trending strip (hidden during search) -->
<div class="trending-strip" id="trendingStrip">
  <div style="font-size:12px;font-weight:800;color:var(--text-muted);white-space:nowrap;align-self:center;">🔥 HOT</div>
  <div id="trendingChips"></div>
</div>

<div class="markets-list" id="marketsList">
  <div class="loading-row">Loading markets...</div>
</div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="location.href='/trade'"><span class="nav-icon">📊</span>Trade</button>
  <button class="nav-item active" onclick="location.href='/markets'"><span class="nav-icon">📈</span>Markets</button>
  <button class="nav-item" onclick="location.href='/history'"><span class="nav-icon">📜</span>History</button>
  <button class="nav-item" onclick="location.href='/profile'"><span class="nav-icon">👤</span>Profile</button>
</nav>

<script src="../assets/js/api.js"></script>
<script>
if (!UltraAPI.token) window.location.href = '/';

let allAssets = [], currentCat = 'all', searchQuery = '';
const miniChartHistories = {};

async function loadAssets() {
  try {
    const data = await UltraAPI.assets();
    allAssets = data.assets;
    renderTrending();
    renderList();
  } catch (e) {
    document.getElementById('marketsList').innerHTML = '<div class="empty-state"><span class="empty-icon">⚠️</span>Failed to load markets</div>';
  }
}

function renderTrending() {
  const chips = allAssets.slice(0, 6).map(a => `
    <div class="trending-chip" onclick="goToTrade('${a.symbol}')">
      <div class="tc-symbol">${a.icon || '🪙'} ${a.symbol}</div>
      <div class="tc-price ${a.change_pct >= 0 ? 'text-green' : 'text-red'}">${fmt.price(a.price)}</div>
      <div class="tc-change ${a.change_pct >= 0 ? 'text-green' : 'text-red'}">${fmt.pct(a.change_pct)}</div>
    </div>
  `).join('');
  document.getElementById('trendingChips').innerHTML = chips;
}

function renderList() {
  let assets = allAssets;
  if (currentCat !== 'all') assets = assets.filter(a => a.category === currentCat);
  if (searchQuery) assets = assets.filter(a => a.symbol.toLowerCase().includes(searchQuery) || a.name.toLowerCase().includes(searchQuery));

  if (!assets.length) {
    document.getElementById('marketsList').innerHTML = '<div class="empty-state"><span class="empty-icon">🔎</span>No assets found</div>';
    return;
  }

  // Group by category if showing all
  let html = '';
  if (currentCat === 'all' && !searchQuery) {
    const groups = {};
    assets.forEach(a => { if (!groups[a.category]) groups[a.category] = []; groups[a.category].push(a); });
    const catLabels = { crypto: '🪙 Cryptocurrency', forex: '💱 Forex', commodity: '🥇 Commodities', stock: '📊 Stocks' };
    Object.entries(groups).forEach(([cat, items]) => {
      html += `<div class="section-header">${catLabels[cat] || cat}</div>`;
      html += items.map(a => renderAssetRow(a)).join('');
    });
  } else {
    html = assets.map(a => renderAssetRow(a)).join('');
  }
  document.getElementById('marketsList').innerHTML = html;
  
  // Draw mini sparklines
  setTimeout(() => {
    assets.forEach(a => drawMiniChart(a.symbol, a.change_pct >= 0));
  }, 50);
}

function renderAssetRow(a) {
  const isUp = a.change_pct >= 0;
  return `
    <div class="market-item" onclick="goToTrade('${a.symbol}')">
      <div class="m-icon">${a.icon || '🪙'}</div>
      <div class="m-info">
        <div class="m-symbol">${a.symbol}</div>
        <div class="m-name">${a.name}</div>
        <div style="font-size:10px;color:var(--gold);font-weight:700;margin-top:2px;">+${a.profit_pct}% payout</div>
      </div>
      <div class="m-center">
        <canvas class="m-mini-chart" id="mini_${a.symbol.replace('/','_')}" width="70" height="32"></canvas>
      </div>
      <div class="m-right">
        <div class="m-price">${a.price > 100 ? '$' + parseFloat(a.price).toFixed(2) : '$' + parseFloat(a.price).toFixed(4)}</div>
        <div class="m-change ${isUp ? 'up' : 'dn'}">${isUp ? '+' : ''}${parseFloat(a.change_pct).toFixed(2)}%</div>
      </div>
    </div>
  `;
}

function drawMiniChart(symbol, isUp) {
  const key = symbol.replace('/','_');
  const canvas = document.getElementById('mini_' + key);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = 70, h = 32;
  ctx.clearRect(0, 0, w, h);

  // Generate or use cached mini data
  if (!miniChartHistories[symbol]) {
    const pts = [];
    let p = 100 + (Math.random() - 0.5) * 10;
    for (let i = 0; i < 20; i++) {
      p += (isUp ? Math.random() * 2 - 0.8 : Math.random() * 2 - 1.2);
      pts.push(p);
    }
    miniChartHistories[symbol] = pts;
  }
  const pts = miniChartHistories[symbol];
  const mn = Math.min(...pts), mx = Math.max(...pts), rng = mx - mn || 1;
  const getY = v => h - ((v - mn) / rng) * (h - 4) - 2;
  const step = w / (pts.length - 1);

  ctx.beginPath();
  pts.forEach((p, i) => { i === 0 ? ctx.moveTo(i * step, getY(p)) : ctx.lineTo(i * step, getY(p)); });
  ctx.strokeStyle = isUp ? '#00d964' : '#ff3b30'; ctx.lineWidth = 1.5; ctx.lineJoin = 'round'; ctx.stroke();
}

function goToTrade(symbol) {
  sessionStorage.setItem('selectedAsset', symbol);
  window.location.href = '/trade';
}

function selectCat(cat, el) {
  currentCat = cat;
  document.querySelectorAll('.cat-pill').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function onSearch() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase();
  document.getElementById('clearSearch').style.display = searchQuery ? 'block' : 'none';
  document.getElementById('trendingStrip').style.display = searchQuery ? 'none' : 'flex';
  renderList();
}

function clearSearch() {
  document.getElementById('searchInput').value = ''; searchQuery = '';
  document.getElementById('clearSearch').style.display = 'none';
  document.getElementById('trendingStrip').style.display = 'flex';
  renderList();
}

// Live price updates
async function refreshPrices() {
  try {
    const data = await UltraAPI.prices();
    Object.entries(data.prices).forEach(([sym, info]) => {
      const asset = allAssets.find(a => a.symbol === sym);
      if (asset) { asset.price = info.price; asset.change_pct = info.change; }
    });
    renderTrending();
    renderList();
  } catch (e) {}
}

loadAssets();
setInterval(refreshPrices, 3000);
</script>
</body>
</html>
