<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#050814">
  <title>Ultra Trading – History</title>
  <link rel="stylesheet" href="../assets/css/shared.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; animation: pageEnter 0.4s ease; }

    .page-header { background: var(--bg-surface); padding: 16px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
    .page-title { font-size: 22px; font-weight: 900; margin-bottom: 14px; }

    /* Stats row */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat-mini { background: var(--bg-elevated); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 10px 12px; text-align: center; }
    .stat-mini-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; display: block; }
    .stat-mini-value { font-size: 16px; font-weight: 900; display: block; margin-top: 2px; }

    /* Win rate ring */
    .winrate-card { background: var(--bg-elevated); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 14px 16px; display: flex; align-items: center; gap: 16px; margin-bottom: 14px; }
    .wr-ring-wrap { position: relative; width: 64px; height: 64px; flex-shrink: 0; }
    .wr-ring-wrap svg { transform: rotate(-90deg); }
    .wr-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; }
    .wr-info h3 { font-size: 16px; font-weight: 800; }
    .wr-info p { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
    .wr-amounts { display: flex; gap: 16px; margin-top: 8px; }
    .wr-amt { display: flex; flex-direction: column; gap: 2px; }
    .wr-amt span { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; }
    .wr-amt strong { font-size: 14px; font-weight: 800; }

    /* Filters */
    .filter-row { display: flex; gap: 8px; }
    .filter-btn { flex: 1; padding: 8px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; background: var(--bg-elevated); border: 1px solid var(--border-color); color: var(--text-secondary); transition: var(--transition); cursor: pointer; }
    .filter-btn.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
    .filter-btn.active.win { background: var(--neon-green); border-color: var(--neon-green); color: #000; }
    .filter-btn.active.lose { background: var(--neon-red); border-color: var(--neon-red); color: #fff; }
    .filter-btn.active.pending { background: var(--gold); border-color: var(--gold); color: #000; }

    /* Trade list */
    .trades-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .trade-card {
      background: var(--bg-card); border-bottom: 1px solid var(--border-light);
      padding: 14px 16px; cursor: pointer; transition: var(--transition);
      display: flex; align-items: center; gap: 12px;
    }
    .trade-card:active { background: var(--bg-elevated); }
    .trade-result-badge { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .result-win { background: rgba(0,217,100,0.15); border: 2px solid var(--neon-green); }
    .result-lose { background: rgba(255,59,48,0.15); border: 2px solid var(--neon-red); }
    .result-pending { background: rgba(245,158,11,0.15); border: 2px solid var(--gold); }
    .trade-info { flex: 1; min-width: 0; }
    .trade-asset { font-size: 14px; font-weight: 800; }
    .trade-meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .trade-meta span { margin-right: 8px; }
    .trade-right { text-align: right; flex-shrink: 0; }
    .trade-pnl { font-size: 16px; font-weight: 900; }
    .trade-amount { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .trade-time { font-size: 11px; color: var(--text-muted); }

    /* Load more */
    .load-more-btn { display: block; margin: 12px 16px; padding: 12px; border-radius: var(--radius-md); background: var(--bg-elevated); border: 1px solid var(--border-color); color: var(--text-secondary); font-size: 14px; font-weight: 700; cursor: pointer; transition: var(--transition); text-align: center; }
    .load-more-btn:active { transform: scale(0.98); }

    .empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
    .empty-icon { font-size: 52px; display: block; margin-bottom: 12px; }
    .empty-text { font-size: 16px; font-weight: 700; display: block; }
    .empty-sub { font-size: 13px; margin-top: 6px; }
  </style>
</head>
<body>

<div class="page-header">
  <div class="page-title">📜 Trade History</div>

  <!-- Stats mini row -->
  <div class="stats-row">
    <div class="stat-mini">
      <span class="stat-mini-label">Total</span>
      <span class="stat-mini-value" id="statTotal">0</span>
    </div>
    <div class="stat-mini">
      <span class="stat-mini-label">Wins</span>
      <span class="stat-mini-value text-green" id="statWins">0</span>
    </div>
    <div class="stat-mini">
      <span class="stat-mini-label">Losses</span>
      <span class="stat-mini-value text-red" id="statLosses">0</span>
    </div>
    <div class="stat-mini">
      <span class="stat-mini-label">Pending</span>
      <span class="stat-mini-value text-gold" id="statPending">0</span>
    </div>
  </div>

  <!-- Win rate card -->
  <div class="winrate-card">
    <div class="wr-ring-wrap">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle cx="32" cy="32" r="26" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="6"/>
        <circle cx="32" cy="32" r="26" fill="none" stroke="var(--neon-green)" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="163.36" id="winRateCircle" stroke-dashoffset="163.36"/>
      </svg>
      <div class="wr-pct text-green" id="winRatePct">0%</div>
    </div>
    <div class="wr-info" style="flex:1">
      <h3>Win Rate</h3>
      <div class="wr-amounts">
        <div class="wr-amt">
          <span>Profit</span>
          <strong class="text-green" id="totalProfit">₹0</strong>
        </div>
        <div class="wr-amt">
          <span>Loss</span>
          <strong class="text-red" id="totalLoss">₹0</strong>
        </div>
        <div class="wr-amt">
          <span>Net P&L</span>
          <strong id="netPnl">₹0</strong>
        </div>
      </div>
    </div>
  </div>

  <!-- Filter buttons -->
  <div class="filter-row">
    <button class="filter-btn active" data-filter="" onclick="setFilter('',this)">All</button>
    <button class="filter-btn win" data-filter="win" onclick="setFilter('win',this)">✅ Win</button>
    <button class="filter-btn lose" data-filter="lose" onclick="setFilter('lose',this)">❌ Loss</button>
    <button class="filter-btn pending" data-filter="pending" onclick="setFilter('pending',this)">⏳ Live</button>
  </div>
</div>

<div class="trades-list" id="tradesList">
  <div class="empty-state">
    <span class="empty-icon">⏳</span>
    <span class="empty-text">Loading...</span>
  </div>
</div>

<nav class="bottom-nav">
  <button class="nav-item" onclick="location.href='/trade'"><span class="nav-icon">📊</span>Trade</button>
  <button class="nav-item" onclick="location.href='/markets'"><span class="nav-icon">📈</span>Markets</button>
  <button class="nav-item active" onclick="location.href='/history'"><span class="nav-icon">📜</span>History</button>
  <button class="nav-item" onclick="location.href='/profile'"><span class="nav-icon">👤</span>Profile</button>
</nav>

<script src="../assets/js/api.js"></script>
<script>
if (!UltraAPI.token) window.location.href = '/';

let currentFilter = '', currentPage = 1, isLoadingMore = false, totalTrades = 0;
let trades = [];

async function loadStats() {
  try {
    const data = await UltraAPI.tradeStats();
    document.getElementById('statTotal').textContent = data.total || 0;
    document.getElementById('statWins').textContent = data.wins || 0;
    document.getElementById('statLosses').textContent = data.losses || 0;
    document.getElementById('statPending').textContent = data.pending || 0;

    const wr = data.total > 0 ? Math.round((data.wins / (data.total - (data.pending||0))) * 100) || 0 : 0;
    document.getElementById('winRatePct').textContent = wr + '%';
    const dashOffset = 163.36 * (1 - wr / 100);
    document.getElementById('winRateCircle').style.strokeDashoffset = dashOffset;

    document.getElementById('totalProfit').textContent = fmt.currency(data.total_profit || 0);
    document.getElementById('totalLoss').textContent = fmt.currency(data.total_loss || 0);
    const net = (data.total_profit || 0) - (data.total_loss || 0);
    const netEl = document.getElementById('netPnl');
    netEl.textContent = (net >= 0 ? '+' : '') + fmt.currency(net);
    netEl.className = 'font-bold ' + (net >= 0 ? 'text-green' : 'text-red');
  } catch (e) {}
}

async function loadTrades(append = false) {
  if (!append) { currentPage = 1; trades = []; }
  try {
    const data = await UltraAPI.tradeHistory(currentFilter, currentPage);
    totalTrades = data.total;
    if (append) trades = [...trades, ...data.trades];
    else trades = data.trades;
    renderTrades();
  } catch (e) {
    document.getElementById('tradesList').innerHTML = '<div class="empty-state"><span class="empty-icon">⚠️</span><span class="empty-text">Failed to load</span></div>';
  }
}

function renderTrades() {
  if (!trades.length) {
    document.getElementById('tradesList').innerHTML = `
      <div class="empty-state">
        <span class="empty-icon">📭</span>
        <span class="empty-text">No trades found</span>
        <p class="empty-sub">Place your first trade to see history here</p>
        <button class="btn btn-primary" style="margin-top:16px" onclick="location.href='/trade'">Start Trading</button>
      </div>`;
    return;
  }

  const html = trades.map(t => {
    const isWin = t.result === 'win', isLose = t.result === 'lose', isPending = t.result === 'pending';
    const emoji = isWin ? '🏆' : isLose ? '💔' : '⏳';
    const resultClass = isWin ? 'result-win' : isLose ? 'result-lose' : 'result-pending';
    const pnlColor = isWin ? 'text-green' : isLose ? 'text-red' : 'text-gold';
    const pnlText = isPending ? 'Live...' : (isWin ? '+' : '') + fmt.currency(t.pnl);
    const typeIcon = t.type === 'call' ? '↑' : '↓';
    const typeColor = t.type === 'call' ? 'text-green' : 'text-red';

    return `
      <div class="trade-card">
        <div class="trade-result-badge ${resultClass}">${emoji}</div>
        <div class="trade-info">
          <div class="trade-asset">${t.asset}</div>
          <div class="trade-meta">
            <span class="${typeColor} font-bold">${typeIcon} ${t.type.toUpperCase()}</span>
            <span>${t.duration}min</span>
            ${t.entry_price ? `<span>@${fmt.price(t.entry_price)}</span>` : ''}
          </div>
          <div class="trade-time">${fmt.timeAgo(t.created_at)}</div>
        </div>
        <div class="trade-right">
          <div class="trade-pnl ${pnlColor}">${pnlText}</div>
          <div class="trade-amount">Bet: ${fmt.currency(t.amount)}</div>
          <div style="font-size:10px;color:var(--text-muted)">+${t.profit_pct}%</div>
        </div>
      </div>
    `;
  }).join('');

  let footer = '';
  if (trades.length < totalTrades) {
    footer = `<button class="load-more-btn" onclick="loadMore()">Load More (${totalTrades - trades.length} remaining)</button>`;
  }

  document.getElementById('tradesList').innerHTML = html + footer;
}

async function loadMore() {
  if (isLoadingMore) return;
  isLoadingMore = true;
  currentPage++;
  await loadTrades(true);
  isLoadingMore = false;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadTrades();
  SoundEngine.play('click');
}

// Auto-refresh pending trades
setInterval(async () => {
  const hasPending = trades.some(t => t.result === 'pending');
  if (hasPending) { await loadTrades(); await loadStats(); }
}, 5000);

loadStats();
loadTrades();
</script>
</body>
</html>
